<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StemFlow - AI 音乐分轨工具</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-inner">
      <div class="nav-brand">
        <svg class="logo-icon" viewBox="0 0 32 32" width="28" height="28">
          <circle cx="16" cy="16" r="14" fill="none" stroke="#4A90D9" stroke-width="2"/>
          <path d="M10 22V12l8-2v10" fill="none" stroke="#FF6B35" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M18 20a2 2 0 100-4 2 2 0 000 4z" fill="#FF6B35"/>
        </svg>
        <span class="brand-text">StemFlow</span>
      </div>
      <div class="nav-links">
        <a href="#features">功能介绍</a>
        <a href="#howto">使用说明</a>
      </div>
    </div>
  </nav>

  <main class="main">
    <!-- Upload Section -->
    <section class="upload-section">
      <h1 class="section-title">AI 智能分轨</h1>
      <p class="section-desc">上传歌曲，自动分离为人声、鼓组、贝斯等独立音轨</p>

      <div class="upload-zone" id="uploadZone">
        <div class="upload-icon">
          <svg viewBox="0 0 48 48" width="48" height="48">
            <path d="M24 6v24M16 18l8-8 8 8" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M8 34v4a4 4 0 004 4h24a4 4 0 004-4v-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <p class="upload-text">拖拽音频文件到此处</p>
        <p class="upload-sub">或点击选择文件 · 支持 MP3 / WAV / FLAC / M4A</p>
        <button class="upload-btn" id="uploadBtn">选择音频文件</button>
        <input type="file" id="fileInput" accept=".mp3,.wav,.flac,.m4a,.aac,.ogg" hidden>
      </div>

      <!-- URL input -->
      <div class="url-input-group">
        <div class="url-divider"><span>或</span></div>
        <div class="url-row">
          <input type="text" class="url-input" id="urlInput" placeholder="粘贴在线音频链接，抓取音乐并自动分轨...">
          <button class="url-btn" id="urlBtn">抓取并分轨</button>
        </div>
      </div>

      <!-- Format hint -->
      <div class="format-hint">
        <span>支持格式</span>
        <span class="format-badge">MP3</span>
        <span class="format-badge">WAV</span>
        <span class="format-badge">FLAC</span>
        <span class="format-badge">M4A</span>
        <span class="format-badge">AAC</span>
        <span class="format-badge">OGG</span>
      </div>
    </section>

    <!-- Processing Section -->
    <section class="processing-section" id="processingSection" style="display:none">
      <div class="process-header">
        <div class="file-info">
          <svg viewBox="0 0 24 24" width="20" height="20" class="file-icon">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" fill="none" stroke="currentColor" stroke-width="2"/>
            <path d="M14 2v6h6" fill="none" stroke="currentColor" stroke-width="2"/>
          </svg>
          <span id="fileName">song.mp3</span>
        </div>
        <span class="process-status" id="processStatus">上传中...</span>
      </div>

      <div class="progress-ring-container">
        <svg class="progress-ring" viewBox="0 0 120 120" width="160" height="160">
          <circle class="progress-track" cx="60" cy="60" r="54" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="8"/>
          <circle class="progress-fill" id="progressFill" cx="60" cy="60" r="54" fill="none" stroke="url(#progGrad)" stroke-width="8"
            stroke-linecap="round" transform="rotate(-90 60 60)"
            stroke-dasharray="339.292" stroke-dashoffset="339.292"/>
          <defs>
            <linearGradient id="progGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#4A90D9"/>
              <stop offset="100%" stop-color="#FF6B35"/>
            </linearGradient>
          </defs>
        </svg>
        <div class="progress-text">
          <span class="progress-pct" id="progressPct">0%</span>
          <span class="progress-label">处理中</span>
        </div>
      </div>

      <div class="process-steps">
        <div class="step" id="stepUpload"><div class="step-dot"></div>文件上传</div>
        <div class="step" id="stepAnalyze"><div class="step-dot"></div>音频分析</div>
        <div class="step" id="stepSeparate"><div class="step-dot"></div>AI 分轨</div>
        <div class="step" id="stepDone"><div class="step-dot"></div>完成</div>
      </div>
    </section>

    <!-- Stems Panel -->
    <section class="stems-section" id="stemsSection" style="display:none">
      <div class="stems-header">
        <h2>分离结果</h2>
        <button class="new-btn" id="newTaskBtn">+ 新任务</button>
      </div>
      <div class="stems-grid" id="stemsGrid">
        <!-- Rendered by JS -->
      </div>
    </section>
  </main>

  <footer class="footer">
    <span>StemFlow · AI 音乐分轨工具</span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
