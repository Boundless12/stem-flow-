<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>职场暴击 - 反职场PUA游戏</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 游戏容器 -->
    <div class="game-container">
        <!-- 游戏标题 -->
        <h1 class="game-title">职场暴击</h1>
        <p class="game-subtitle">反职场PUA</p>
        
        <!-- 游戏说明 -->
        <div class="game-info" id="gameInfo">
            <h2>玩法说明</h2>
            <p>1. 选择一个职场人物进入游戏</p>
            <p>2. 点击人物不同部位进行打击</p>
            <p>3. 每次打击会显示PUA语录和回怼金句</p>
            <p>4. 连击越高，伤害越大</p>
            <p>5. 把PUA能量打空即可获胜！</p>
            <button class="start-btn" onclick="showCharacterSelect()">开始游戏</button>
        </div>
        
        <!-- 人物选择界面 -->
        <div class="character-select" id="characterSelect" style="display: none;">
            <h2>选择目标</h2>
            <div class="characters">
                <div class="character-card" onclick="selectCharacter('boss-female')">
                    <div class="character-image" data-character="boss-female">
                        <div class="character-name">刻薄女老板</div>
                        <div class="character-title">中年PUA大师</div>
                    </div>
                </div>
                <div class="character-card" onclick="selectCharacter('boss-male')">
                    <div class="character-image" data-character="boss-male">
                        <div class="character-name">油腻男老板</div>
                        <div class="character-title">画饼专家</div>
                    </div>
                </div>
                <div class="character-card" onclick="selectCharacter('colleague-male')">
                    <div class="character-image" data-character="colleague-male">
                        <div class="character-name">猥琐男同事</div>
                        <div class="character-title">告状专业户</div>
                    </div>
                </div>
                <div class="character-card" onclick="selectCharacter('colleague-female')">
                    <div class="character-image" data-character="colleague-female">
                        <div class="character-name">阴阳女同事</div>
                        <div class="character-title">冷嘲热讽王</div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 游戏界面 -->
        <div class="game-play" id="gamePlay" style="display: none;">
            <!-- 人物信息 -->
            <div class="character-info">
                <h2 id="currentCharacterName">刻薄女老板</h2>
                <p id="currentCharacterTitle">中年PUA大师</p>
            </div>
            
            <!-- PUA语录和回怼金句 -->
            <div class="dialog-box">
                <div class="pua-quote" id="puaQuote">"你最近工作状态不好啊，是不是家里有什么事？"</div>
                <div class="counter-quote" id="counterQuote">"我的工作状态很好，不需要你操心。"</div>
            </div>
            
            <!-- 血条 -->
            <div class="health-bar">
                <div class="health-bar-fill" id="healthBarFill"></div>
                <div class="health-bar-text" id="healthBarText">100%</div>
            </div>
            
            <!-- 连击计数器 -->
            <div class="combo-counter">
                <span id="comboCount">0</span> 连击
            </div>
            
            <!-- 人物身体部位 -->
            <div class="character-body" id="characterBody">
                <div class="body-part" data-part="head"></div>
                <div class="body-part" data-part="chest"></div>
                <div class="body-part" data-part="left-arm"></div>
                <div class="body-part" data-part="right-arm"></div>
                <div class="body-part" data-part="stomach"></div>
                <div class="body-part" data-part="legs"></div>
            </div>
            
            <!-- 伤害数字 -->
            <div class="damage-numbers" id="damageNumbers"></div>
            
            <!-- 控制按钮 -->
            <div class="game-controls">
                <button class="back-btn" onclick="backToCharacterSelect()">更换目标</button>
            </div>
        </div>
        
        <!-- 胜利界面 -->
        <div class="victory-screen" id="victoryScreen" style="display: none;">
            <h2>胜利！</h2>
            <p>你成功击败了PUA大师！</p>
            <button class="restart-btn" onclick="restartGame()">再来一局</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
